<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yukyu.net Chat - MCP App</title>
  <style>
    :root {
      --bg: #000;
      --fg: #22c55e;
      --fg-dim: #166534;
      --fg-muted: #14532d;
      --border: #14532d;
      --cyan: #22d3ee;
      --cyan-dim: #0891b2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Sources horizontal scroll */
    #sources {
      display: none;
      gap: 0.5rem;
      padding: 0.75rem;
      overflow-x: auto;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.7), transparent);
      scrollbar-width: thin;
      scrollbar-color: var(--fg-dim) transparent;
    }
    #sources::-webkit-scrollbar { height: 4px; }
    #sources::-webkit-scrollbar-track { background: transparent; }
    #sources::-webkit-scrollbar-thumb { background: var(--fg-dim); border-radius: 2px; }
    .source-card {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: var(--fg);
      text-decoration: none;
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .source-card:hover {
      background: rgba(34, 197, 94, 0.2);
      border-color: var(--fg);
    }
    .source-card .index {
      width: 1.25rem;
      height: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--fg-dim);
      border-radius: 0.25rem;
      font-size: 0.625rem;
      color: #000;
      font-weight: bold;
    }
    .source-card .score {
      font-size: 0.625rem;
      color: var(--fg-muted);
      margin-left: auto;
    }

    /* Status indicator */
    #status {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      color: var(--fg);
    }
    #status.visible { display: flex; }
    .spinner {
      width: 1rem;
      height: 1rem;
      border: 2px solid var(--fg-dim);
      border-top-color: var(--fg);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .message {
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      max-width: 85%;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: var(--cyan-dim);
      color: #fff;
    }
    .message.assistant {
      align-self: flex-start;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid var(--border);
    }
    .message.system {
      align-self: center;
      background: transparent;
      color: var(--fg-dim);
      font-size: 0.875rem;
      padding: 0.5rem;
    }
    .message.error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid #dc2626;
      color: #f87171;
    }

    /* Provider badge */
    #provider {
      position: fixed;
      top: 0.5rem;
      right: 0.5rem;
      display: none;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.5rem;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid var(--border);
      border-radius: 1rem;
      font-size: 0.625rem;
      color: var(--fg);
    }
    #provider.visible { display: flex; }

    /* Input form */
    #chat-form {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      border-top: 2px solid var(--fg);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(8px);
    }
    #chat-input {
      flex: 1;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: var(--fg);
      font-size: 1rem;
    }
    #chat-input:focus {
      outline: none;
      border-color: var(--fg);
    }
    #chat-input::placeholder { color: var(--fg-muted); }
    #chat-input:disabled { opacity: 0.5; }
    button {
      padding: 0.75rem 1.5rem;
      background: var(--fg-dim);
      border: none;
      border-radius: 0.5rem;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: var(--fg); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="provider"><span id="provider-icon"></span><span id="provider-name"></span></div>
  <div id="sources"></div>
  <div id="status"><div class="spinner"></div><span id="status-text"></span></div>
  <div id="messages">
    <div class="message system">何でも聞いてね！ブログの記事について教えてあげるよ。</div>
  </div>
  <form id="chat-form">
    <input type="text" id="chat-input" placeholder="メッセージを入力..." autocomplete="off">
    <button type="submit" id="submit-btn">送信</button>
  </form>

  <script type="module">
    // MCP Apps communication via postMessage
    const isInIframe = window.parent !== window;
    let chatHistory = [];

    // Elements
    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input');
    const submitBtn = document.getElementById('submit-btn');
    const messages = document.getElementById('messages');
    const sources = document.getElementById('sources');
    const status = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const provider = document.getElementById('provider');
    const providerName = document.getElementById('provider-name');

    // Send message to host
    function sendToHost(type, data) {
      if (isInIframe) {
        window.parent.postMessage({ type, ...data }, '*');
      }
    }

    // Listen for messages from host
    window.addEventListener('message', (event) => {
      const { type, ...data } = event.data || {};

      switch (type) {
        case 'provider':
          providerName.textContent = data.model || data.provider;
          provider.classList.add('visible');
          break;

        case 'status':
          showStatus(data.message);
          if (data.documents) {
            showSources(data.documents);
          }
          break;

        case 'sources':
          if (data.sources?.length > 0) {
            showSources(data.sources);
          }
          hideStatus();
          break;

        case 'content':
          appendToLastAssistant(data.content);
          break;

        case 'done':
          hideStatus();
          setLoading(false);
          // Save to history
          const lastMsg = messages.querySelector('.message.assistant:last-child');
          if (lastMsg) {
            chatHistory.push({ role: 'assistant', content: lastMsg.textContent });
          }
          break;

        case 'error':
          hideStatus();
          setLoading(false);
          addMessage('error', data.message || 'エラーが発生しました');
          break;

        case 'prank':
          hideStatus();
          setLoading(false);
          addMessage('assistant', data.message);
          break;
      }
    });

    // Form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      addMessage('user', message);
      chatHistory.push({ role: 'user', content: message });
      input.value = '';
      setLoading(true);
      sources.style.display = 'none';

      // Create placeholder for streaming response
      createAssistantPlaceholder();

      // Send to host
      sendToHost('chat', { message, history: chatHistory.slice(-6) });
    });

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = content;
      messages.appendChild(div);
      scrollToBottom();
    }

    function createAssistantPlaceholder() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'streaming-message';
      messages.appendChild(div);
      scrollToBottom();
    }

    function appendToLastAssistant(content) {
      let msg = document.getElementById('streaming-message');
      if (!msg) {
        createAssistantPlaceholder();
        msg = document.getElementById('streaming-message');
      }
      msg.textContent += content;
      scrollToBottom();
    }

    function showSources(sourceList) {
      sources.innerHTML = '';
      sourceList.forEach((src, i) => {
        const title = src.title || src;
        const slug = src.slug || '';
        const score = src.score ? Math.round(src.score * 100) : null;

        const a = document.createElement('a');
        a.href = slug ? '/posts/' + slug : '#';
        a.target = '_blank';
        a.className = 'source-card';
        a.innerHTML = '<span class="index">' + (i + 1) + '</span>' +
          '<span class="title">' + title + '</span>' +
          (score ? '<span class="score">' + score + '%</span>' : '');
        sources.appendChild(a);
      });
      sources.style.display = 'flex';
    }

    function showStatus(text) {
      statusText.textContent = text;
      status.classList.add('visible');
    }

    function hideStatus() {
      status.classList.remove('visible');
    }

    function setLoading(loading) {
      input.disabled = loading;
      submitBtn.disabled = loading;
      if (!loading) {
        const streaming = document.getElementById('streaming-message');
        if (streaming) streaming.removeAttribute('id');
      }
    }

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }

    // Notify host that app is ready
    sendToHost('ready', {});
  </script>
</body>
</html>
